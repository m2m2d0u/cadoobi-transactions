spring:
  application:
    name: ${SPRING_APPLICATION_NAME:cadoobi-transactions}

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cadoobi_transactions}
    username: ${SPRING_DATASOURCE_USERNAME:cadoobi_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cadoobi_pass_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
        jdbc:
          time_zone: ${SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE:UTC}

  # Flyway Configuration
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}

# Server Configuration
server:
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api/v1}
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:true}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  packages-to-scan: sn.symmetry.cadoobi.controller
  show-actuator: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when-authorized}
  metrics:
    export:
      prometheus:
        enabled: ${METRICS_PROMETHEUS_ENABLED:false}

# Application Configuration
app:
  # Notification retry settings
  notification:
    max-retry-attempts: ${APP_NOTIFICATION_MAX_RETRY_ATTEMPTS:5}
    retry-delay-seconds: ${APP_NOTIFICATION_RETRY_DELAY_SECONDS:5,30,120,600,3600}
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://spare.symmetry.sn
  # Gift card settings
  gift-card:
    code-length: ${APP_GIFT_CARD_CODE_LENGTH:12}
    expiry-days: ${APP_GIFT_CARD_EXPIRY_DAYS:365}
    qr-code-size: ${APP_GIFT_CARD_QR_CODE_SIZE:300}

  # Payment settings
  payment:
    expiry-hours: ${APP_PAYMENT_EXPIRY_HOURS:24}

  # JWT settings
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}        # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

  # Security settings
  security:
    encryption:
      # AES-256 encryption key (base64-encoded 32-byte key)
      # Generate with: openssl rand -base64 32
      # IMPORTANT: Change this default key in production!
      key: ${ENCRYPTION_KEY:/RDM0Dh3A2K1S0hGRjFohlwNDo75RaxnrvaTZJ/qN7s=}

# Logging
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    sn.symmetry.cadoobi: ${LOGGING_LEVEL_SN_SYMMETRY_CADOOBI:DEBUG}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
    org.hibernate: ${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
  pattern:
    console: ${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
    file: ${LOGGING_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}
  file:
    name: ${LOGGING_FILE_NAME:logs/cadoobi-transactions.log}
    max-size: ${LOGGING_FILE_MAX_SIZE:10MB}
    max-history: ${LOGGING_FILE_MAX_HISTORY:30}
